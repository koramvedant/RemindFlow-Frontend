<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Logs – RemindFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/sidebar.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div id="sidebarContainer"></div>

    <main class="main">

      <div class="page-header">
        <div class="page-header-left">
          <h1 id="clientName">Client</h1>
          <div class="client-trust-row">
            <div class="client-trust-item">
              <span class="client-trust-label">Trust grade</span>
              <span id="userTrust" class="client-trust-value">—</span>
            </div>
            <div class="client-trust-sep"></div>
            <div class="client-trust-item">
              <span class="client-trust-label">Payment reliability</span>
              <span id="globalTrust" class="client-trust-value">—</span>
            </div>
          </div>
        </div>
        <div class="page-header-actions">
          <a href="/clients.html" class="btn-secondary">← Back to Clients</a>
        </div>
      </div>

      <div class="filters-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by invoice ID…"
          autocomplete="off"
        />
        <select id="statusFilter">
          <option value="">All status</option>
          <option value="draft">Draft</option>
          <option value="sent">Issued</option>
          <option value="paid">Paid</option>
          <option value="overdue">Overdue</option>
          <option value="partially_paid">Partially Paid</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Invoice</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Due Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="invoiceTable"></tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prevBtn">← Prev</button>
        <button id="nextBtn">Next →</button>
      </div>

    </main>

    <script type="module">
      import { requireAuth } from "/js/guard.js";
      requireAuth();
    </script>
    <script src="/js/loadSidebar.js"></script>
    <script type="module" src="/js/invoice-logs.js"></script>
  </body>
</html>
