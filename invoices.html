<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoices – RemindFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/sidebar.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div id="sidebarContainer"></div>

    <main class="main">

      <div class="page-header">
        <div class="page-header-left">
          <h1>Invoices</h1>
          <p>Total: <span id="totalInvoices">0</span> invoices</p>
        </div>
        <div class="page-header-actions">
          <a href="/import.html" class="btn-secondary">Import</a>
          <a href="/add-invoice.html" data-requires-plan class="btn-primary">+ Add Invoice</a>
        </div>
      </div>

      <div class="filters-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by invoice ID, client, amount or date…"
          autocomplete="off"
        />
        <select id="statusFilter">
          <option value="all">All status</option>
          <option value="draft">Draft</option>
          <option value="issued">Issued</option>
          <option value="overdue">Overdue</option>
          <option value="paid">Paid</option>
          <option value="partially_paid">Partially Paid</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Invoice</th>
              <th>Client</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Due Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="invoiceTable"></tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prevBtn">← Prev</button>
        <button id="nextBtn">Next →</button>
      </div>

    </main>

    <div id="toast"></div>

    <script type="module">
      import { requireAuth } from "/js/guard.js";
      requireAuth();
    </script>
    <script src="/js/loadSidebar.js"></script>
    <script type="module" src="/js/invoices.js"></script>
  </body>
</html>
