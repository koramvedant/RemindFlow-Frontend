<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Client – RemindFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/app-extras.css" />
  </head>
  <body style="display:block; background:var(--bg);">

    <div class="form-page">

      <div class="form-page-header">
        <button class="back-btn" onclick="history.back()">← Back</button>
        <h1 class="form-page-title">Edit Client</h1>
      </div>

      <form id="editClientForm" data-loading="true">

        <!-- Basic details -->
        <div class="form-card">
          <span class="form-card-title">Basic details</span>

          <div class="field">
            <label for="clientName">Client name <span class="required">*</span></label>
            <input type="text" id="clientName" required />
          </div>

          <div class="field">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" required />
            <p class="hint">Primary communication channel.</p>
            <div class="error" id="emailError" style="display:none; font-size:12px; color:#f87171; margin-top:4px;">Email is required.</div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="phone">Phone</label>
              <input type="text" id="phone" />
            </div>
            <div class="field">
              <label for="companyName">Company name</label>
              <input type="text" id="companyName" />
            </div>
          </div>

          <div class="field">
            <label for="taxId">Tax ID (GST / VAT)</label>
            <input type="text" id="taxId" />
          </div>
        </div>

        <!-- Address -->
        <div class="form-card">
          <span class="form-card-title">Billing address</span>

          <div class="field">
            <label for="address_line1">Address line 1</label>
            <input type="text" id="address_line1" />
          </div>

          <div class="field">
            <label for="address_line2">Address line 2 <span style="color:var(--text-3);font-size:11px;">(optional)</span></label>
            <input type="text" id="address_line2" />
          </div>

          <div class="field-row">
            <div class="field">
              <label for="city">City</label>
              <input type="text" id="city" />
            </div>
            <div class="field">
              <label for="state">State</label>
              <input type="text" id="state" />
            </div>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="postal_code">Postal code</label>
              <input type="text" id="postal_code" />
            </div>
            <div class="field">
              <label for="country">Country</label>
              <input type="text" id="country" value="India" />
            </div>
          </div>
        </div>

        <!-- Notes -->
        <div class="form-card">
          <span class="form-card-title">Notes</span>
          <div class="field">
            <textarea id="notes" placeholder="Internal notes about this client…"></textarea>
          </div>
        </div>

        <!-- Actions -->
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="primary-btn" id="saveBtn" disabled style="width:auto; padding:12px 28px;">Save Changes</button>
        </div>

      </form>
    </div>

    <script type="module">
      import { requireAuth } from "/js/guard.js";
      requireAuth();
    </script>
    <script type="module" src="/js/edit-client.js"></script>
    <script>
      document.getElementById("cancelBtn").addEventListener("click", () => {
        window.location.href = "/clients.html";
      });
    </script>
  </body>
</html>
