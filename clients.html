<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clients – RemindFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/sidebar.css" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div id="sidebarContainer"></div>

    <main class="main">

      <div class="page-header">
        <div class="page-header-left">
          <h1>Clients</h1>
          <p>Total: <span id="totalClients">0</span> clients</p>
        </div>
        <div class="page-header-actions">
          <a href="/add-client.html" data-requires-plan class="btn-primary">+ Add Client</a>
        </div>
      </div>

      <div class="filters-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by name or ID…"
          autocomplete="off"
        />
        <select id="trustFilter">
          <option value="">All trust grades</option>
          <option value="A">A — Excellent</option>
          <option value="B">B — Reliable</option>
          <option value="C">C — Delayed</option>
          <option value="D">D — High Risk</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Client</th>
              <th>Trust Grade</th>
              <th>Last Payment</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="clientTable"></tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prevBtn">← Prev</button>
        <button id="nextBtn">Next →</button>
      </div>

    </main>

    <div id="toast"></div>

    <script type="module">
      import { requireAuth } from "/js/guard.js";
      requireAuth();
    </script>
    <script src="/js/loadSidebar.js"></script>
    <script type="module" src="/js/clients.js"></script>
  </body>
</html>
