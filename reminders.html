<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reminders – RemindFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/sidebar.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/reminders.css" />
</head>
<body>

  <div id="sidebarContainer"></div>

  <main class="main">

    <div class="page-header">
      <div class="page-header-left">
        <h1>Reminders</h1>
        <p>Sent and upcoming follow-ups</p>
      </div>
    </div>

    <div class="filters-bar">
      <input type="text" id="searchInput" placeholder="Search by client or invoice…" />
      <select id="statusFilter">
        <option value="">All status</option>
        <option value="upcoming">Upcoming</option>
        <option value="sent">Sent</option>
        <option value="opened">Opened</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Invoice</th>
            <th>Client</th>
            <th>Stage</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="reminderTable"></tbody>
      </table>
    </div>

  </main>

  <script src="/js/loadSidebar.js"></script>
  <script type="module" src="/js/reminders.js"></script>

  <!-- Reminder view modal -->
  <div id="reminderModal" class="reminder-modal">
    <div class="reminder-modal-content">
      <div class="reminder-modal-header">
        <h3 id="modalSubject"></h3>
        <button id="closeReminderModal">✕</button>
      </div>
      <div class="reminder-meta" id="modalMeta"></div>
      <div id="modalBody" class="reminder-email-preview"></div>
      <div class="reminder-attachment" id="modalAttachment"></div>
    </div>
  </div>

</body>
</html>
