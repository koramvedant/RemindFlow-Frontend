<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Preview – RemindFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/invoice-preview.css" />
  <link rel="stylesheet" href="/css/invoice-send-modal.css" />
</head>
<body style="display:block; background:var(--bg);">

  <div class="preview-page">

    <div class="preview-topbar">
      <button class="back-btn" onclick="history.back()">← Back</button>
      <div class="preview-topbar-center">
        <span class="preview-topbar-label">Template</span>
        <select id="layoutSelect" class="preview-layout-select">
          <option value="minimal">Minimal</option>
          <option value="professional">Professional</option>
          <option value="modern">Modern</option>
        </select>
      </div>
      <div class="preview-topbar-actions">
        <button id="saveDraft" class="btn-secondary">Save Draft</button>
        <button id="finalSave" class="btn-primary">Finalize Invoice</button>
      </div>
    </div>

    <div class="preview-body">
      <div id="invoiceBox" class="preview-invoice-wrap"></div>
    </div>

  </div>

  <!-- Send Invoice Modal -->
  <div id="sendInvoiceModal" class="sim-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="simTitle">
    <div class="sim-card">
      <div class="sim-header">
        <div class="sim-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </div>
        <div>
          <h3 id="simTitle">Send Invoice</h3>
          <p class="sim-subtitle">Invoice finalized. How would you like to send it?</p>
        </div>
      </div>
      <div class="sim-email-row">
        <span class="sim-email-label">To:</span>
        <span class="sim-email-value" id="simClientEmail">—</span>
      </div>
      <div id="simStep1">
        <div class="sim-options">
          <button class="sim-option-card" id="simSendNowBtn">
            <div class="sim-option-icon sim-option-icon--now"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>
            <div class="sim-option-text"><strong>Send Now</strong><span>Email the invoice to your client immediately</span></div>
            <div class="sim-option-arrow">→</div>
          </button>
          <button class="sim-option-card" id="simScheduleBtn">
            <div class="sim-option-icon sim-option-icon--schedule"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div>
            <div class="sim-option-text"><strong>Schedule for Later</strong><span>Pick a date and time to send automatically</span></div>
            <div class="sim-option-arrow">→</div>
          </button>
        </div>
        <button class="sim-skip-btn" id="simSkipBtn">Skip for now — save without sending</button>
      </div>
      <div id="simStepConfirmNow" class="hidden">
        <div class="sim-confirm-box">
          <div class="sim-confirm-icon sim-confirm-icon--now"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></div>
          <p>The invoice will be emailed to <strong id="simConfirmEmail">—</strong> right now.</p>
        </div>
        <div class="sim-actions">
          <button class="sim-btn-ghost" id="simBackFromNow">← Back</button>
          <button class="sim-btn-primary" id="simConfirmSendNow"><span>Send Invoice</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></button>
        </div>
      </div>
      <div id="simStepSchedule" class="hidden">
        <div class="sim-schedule-form">
          <div class="sim-field"><label for="simScheduleDate">Date</label><input type="date" id="simScheduleDate" /></div>
          <div class="sim-field"><label for="simScheduleTime">Time</label><input type="time" id="simScheduleTime" /></div>
        </div>
        <p class="sim-schedule-hint" id="simScheduleHint"></p>
        <div class="sim-actions">
          <button class="sim-btn-ghost" id="simBackFromSchedule">← Back</button>
          <button class="sim-btn-primary" id="simConfirmSchedule"><span>Schedule Send</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></button>
        </div>
      </div>
      <div id="simStepSuccess" class="hidden">
        <div class="sim-success">
          <div class="sim-success-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
          <h4 id="simSuccessTitle">Invoice Sent!</h4>
          <p id="simSuccessMsg">The invoice has been emailed to your client.</p>
          <button class="sim-btn-primary sim-btn-full" id="simDoneBtn">Go to Invoice →</button>
        </div>
      </div>
    </div>
  </div>

  <div id="processingOverlay" class="processing-overlay hidden">
    <div class="processing-box">
      <div class="spinner"></div>
      <h3 id="processingTitle">Finalizing Invoice</h3>
      <p id="processingStep">Generating secure document…</p>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from "/js/guard.js";
    requireAuth();
  </script>
  <script type="module" src="/js/invoice-preview.js"></script>
  <script type="module" src="/js/invoice-send-modal.js"></script>
</body>
</html>
